name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache-dependency-path: ./go.mod

      - name: Run go vet
        run: go vet ./...

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: [go-vet]
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache-dependency-path: ./go.mod

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run unit tests
        run: |
          go test -v -count=1 -timeout=10m \
            ./billing/... \
            ./delay/... \
            ./models/creditgrant/... \
            ./models/pricingrule/... \
            ./models/cryptobalance/... \
            ./models/cryptopaymentintent/... \
            ./models/networktoken/... \
            ./models/product/... \
            ./payment/...

      - name: Run Ginkgo test suites
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          ginkgo -r --randomize-all --fail-fast --trace \
            --skip-package=test-integration \
            test/
