name: Build Frontend Apps

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile.site'
      - 'Dockerfile.store'
      - 'Dockerfile.admin'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  site:
    permissions:
      contents: read
      packages: write
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/commerce-site
      context: .
      dockerfile: Dockerfile.site

      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  store:
    permissions:
      contents: read
      packages: write
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/commerce-store
      context: .
      dockerfile: Dockerfile.store

      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  admin:
    permissions:
      contents: read
      packages: write
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/commerce-admin
      context: ./app
      dockerfile: admin/Dockerfile
      build-args: |
        NEXT_PUBLIC_GATEWAY_KEY=${{ secrets.CLOUD_API_SERVICE_KEY }}

      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
