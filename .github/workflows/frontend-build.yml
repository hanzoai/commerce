name: Build Frontend Apps

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile.site'
      - 'Dockerfile.store'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  site:
    permissions:
      contents: read
      packages: write
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/commerce-site
      context: .
      dockerfile: Dockerfile.site
      platforms: linux/amd64
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  store:
    permissions:
      contents: read
      packages: write
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/commerce-store
      context: .
      dockerfile: Dockerfile.store
      platforms: linux/amd64
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
