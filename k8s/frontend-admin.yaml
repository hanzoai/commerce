# admin.commerce.hanzo.ai now serves the embedded SPA inside commerced.
# The legacy commerce-admin Next.js sidecar is retired. The Ingress
# routes admin.commerce.hanzo.ai → commerce service, and the hanzoai/
# ingress rewrite plug rewrites the path so / → /_/commerce/ui/, which
# the embedded SPA handler in pkg/commerce/server.go owns.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commerce-admin
  namespace: hanzo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Rewrite the path so admin.commerce.hanzo.ai/foo/bar lands on
    # /_/commerce/ui/foo/bar inside commerced, where the embedded
    # SPA handler picks it up.
    nginx.ingress.kubernetes.io/rewrite-target: /_/commerce/ui/$2
spec:
  ingressClassName: hanzo
  tls:
    - hosts:
        - admin.commerce.hanzo.ai
      secretName: commerce-admin-tls
  rules:
    - host: admin.commerce.hanzo.ai
      http:
        paths:
          - path: /(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: commerce
                port:
                  number: 8001
